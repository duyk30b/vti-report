version: '3.8'
name: smc_project

services:
  report-service:
    container_name: smc-report-service-local
    image: smc-report-service-image
    build:
      context: .
      dockerfile: Dockerfile
      target: local
    networks:
      mesx_network:
        ipv4_address: ${CONTAINER_NETWORK_IP}
    restart: unless-stopped
    volumes:
      - .:/app
      - smc_report_node_modules:/app/node_modules/
    command: npm run start:debug
    ports:
      - ${APP_CONTAINER_PORT}:3000
      - 9237:9237

networks:
  mesx_network:
    name: ${MESX_NET_NAME}
    external: true

volumes:
  smc_report_node_modules:
